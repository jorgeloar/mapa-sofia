<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Leaflet CSS para el mapa -->

    <!-- Google Fonts -->

    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    coral: '#F8464A',
                    purpura: '#7537C8',
                    azul: '#2D40DF',
                    turquesa: '#1CC4AB',
                    amarillo: '#F1DC1B',

    <style>
        body { font-family: 'Nunito', sans-serif; background: linear-gradient(135deg, #f0e6fa 0%, #e6eafa 40%, #e0f7f3 100%); }
        .font-title { font-family: 'Fredoka', sans-serif; }
        .font-diario { font-family: 'Caveat', cursive; }

        #map { background-color: #e6eafa; border-radius: 1rem; box-shadow: 0 8px 25px -5px rgba(117, 55, 200, 0.2); }
        .leaflet-interactive { transition: fill 0.2s ease, fill-opacity 0.2s ease; }

        @keyframes bounce-short {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .animate-bounce-short { animation: bounce-short 0.5s ease-in-out; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .bdr-turquesa { border-color: #1CC4AB; }
        .ring-turquesa { --tw-ring-color: rgba(28, 196, 171, 0.35); }
        .bdr-azul { border-color: #2D40DF; }
        .ring-azul { --tw-ring-color: rgba(45, 64, 223, 0.35); }
        .bdr-purpura { border-color: #7537C8; }
        .ring-purpura { --tw-ring-color: rgba(117, 55, 200, 0.35); }

</head>
<body class="h-screen w-screen flex flex-col overflow-hidden text-slate-800">

    <!-- Encabezado -->

        <h1 class="text-2xl sm:text-3xl font-title font-bold flex items-center gap-2 drop-shadow-md">
            🎒 ¡La expedición de Sofía! 🇲🇽 ✈️ 🇪🇸
        </h1>
        <div id="exam-progress" class="hidden flex rounded-full px-4 py-1 font-bold text-lg items-center gap-3 shadow-inner" style="background: rgba(0,0,0,0.2);">
            <span><span id="progress-label">Pregunta</span> <span id="exam-current" class="text-amarillo">0</span>/<span id="exam-total">52</span></span>
            <span class="opacity-40">|</span>
            <span><span id="correct-label">Aciertos</span>: <span id="exam-correct" class="text-amarillo">0</span></span>
        </div>
    </header>

    <!-- Contenedor Principal -->
    <main class="flex-1 flex flex-col md:flex-row p-4 gap-4 overflow-hidden">

        <!-- Panel Izquierdo: Controles e Info -->

                    Preparando la mochila y la brújula para Sofía... 🗺️🧭

        // Función para normalizar nombres (quitar acentos para la lógica interna)
        function normalizarNombre(nombre) {
            return nombre.toLowerCase()
                .replaceAll("á", "a").replaceAll("é", "e").replaceAll("í", "i")
                .replaceAll("ó", "o").replaceAll("ú", "u").replaceAll("ü", "u");
                // Nota: Mantenemos la "ñ" tal cual para que coincida con "a coruña"
        }

        function obtenerComunidad(nombreProvincia) {
            const key = normalizarNombre(nombreProvincia);
            return mapProvinciaComunidad[key] || mapProvinciaComunidad[nombreProvincia.toLowerCase()] || "Comunidad Desconocida";
        }

        function obtenerPista(nombreProvincia) {
            const key = normalizarNombre(nombreProvincia);
            return pistasProvincias[key] || pistasProvincias[nombreProvincia.toLowerCase()] || "¡Explora el mapa para memorizar su forma secreta!";
        }

        // --- ESTADO DEL JUEGO ---
        let map, geojsonLayer;
        let provincesFeatures = [];
        let currentMode = 'explore';
        let currentTargetFeature = null;

        // Estado del examen
        let examQueue = [];
        let examTotal = 0;
        let examCorrect = 0;
        let examCurrent = 0;
        let waitingForNext = false;

        // Estado del modo práctica
        let practiceQueue = [];
        let practiceFound = 0;
        let practiceTotalInCommunity = 0;
        let currentCommunityName = '';
        let completedCommunities = new Set();

        function shuffleArray(arr) {
            const shuffled = [...arr];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function iniciarExamen() {
            examQueue = shuffleArray(provincesFeatures);
            examTotal = examQueue.length;
            examCorrect = 0;
            examCurrent = 0;
            waitingForNext = false;
            document.getElementById('progress-label').innerText = 'Pregunta';
            document.getElementById('correct-label').innerText = 'Aciertos';
            actualizarProgreso();
            document.getElementById('exam-progress').classList.remove('hidden');
        }

        function actualizarProgreso() {
            document.getElementById('exam-current').innerText = examCurrent;
            document.getElementById('exam-total').innerText = examTotal;
            document.getElementById('exam-correct').innerText = examCorrect;
        }

        // --- INICIALIZACIÓN DEL MAPA ---
        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([40.4637, -3.7492], 6);
            L.control.zoom({ position: 'bottomright' }).addTo(map);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
                subdomains: 'abcd',
                maxZoom: 10,
                minZoom: 5
            }).addTo(map);

            loadGeoJSON();
        }

        // --- CARGA DE DATOS ---
        function loadGeoJSON() {
            const geojsonUrl = 'https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/spain-provinces.geojson';

            fetch(geojsonUrl)
                .then(response => response.json())
                .then(data => {
                    provincesFeatures = data.features;
                    geojsonLayer = L.geoJSON(data, {
                        style: defaultStyle,
                        onEachFeature: onEachFeature
                    }).addTo(map);

                    map.fitBounds(geojsonLayer.getBounds(), { padding: [20, 20] });
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('game-content').classList.remove('hidden');
                    document.getElementById('game-content').classList.add('flex');
                    setMode('explore');
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('loading').innerText = "Ups, el mapa se voló con el viento. ¡Recarga la página!";
                    document.getElementById('loading').classList.replace('text-gray-500', 'text-red-500');
                });
        }

        // --- ESTILOS DEL MAPA ---
        function defaultStyle() {
            return { fillColor: '#ffffff', weight: 2, color: '#c4b5fd', fillOpacity: 0.7 };
        }
        function highlightStyle(isTarget = false) {
            return { fillColor: isTarget ? '#7537C8' : '#1CC4AB', weight: 3, color: '#334155', fillOpacity: 0.85 };
        }
        function successStyle() { return { fillColor: '#1CC4AB', weight: 3, color: '#065f46', fillOpacity: 0.9 }; }
        function errorStyle() { return { fillColor: '#F8464A', weight: 3, color: '#7f1d1d', fillOpacity: 0.9 }; }

        // --- INTERACCIONES DEL MAPA ---
        function onEachFeature(feature, layer) {
            layer.on({
                mouseover: (e) => handleHover(e, feature),
                mouseout: (e) => handleMouseOut(e),
                click: (e) => handleClick(e, feature, layer)
            });
        }

        function handleHover(e, feature) {
            const layer = e.target;
            const provName = feature.properties.name;
            const comName = obtenerComunidad(provName);
            const pista = obtenerPista(provName);

            if (currentMode === 'explore') {
                layer.setStyle(highlightStyle());
                layer.bringToFront();

                const infoDiv = document.getElementById('explore-info');
                document.getElementById('info-prov').innerText = provName;
                document.getElementById('info-com').innerText = comName;
                document.getElementById('info-pista').innerText = pista;
                infoDiv.classList.remove('hidden');
            } else if ((currentMode === 'guess_prov' || currentMode === 'practice') && !waitingForNext) {
                layer.setStyle({ fillOpacity: 0.9 });
            }
        }

        function handleMouseOut(e) {
            const layer = e.target;
            if (waitingForNext) return;
            if (!(currentMode === 'guess_com' && currentTargetFeature && layer.feature === currentTargetFeature)) {
                geojsonLayer.resetStyle(layer);
            }
            document.getElementById('explore-info').classList.add('hidden');
        }

        function handleClick(e, feature, layer) {
            if (currentMode === 'explore') {
                lanzarConfeti(e.originalEvent.clientX, e.originalEvent.clientY, 20);

            } else if (currentMode === 'guess_prov') {
                if (!currentTargetFeature || waitingForNext) return;

                if (feature.properties.name === currentTargetFeature.properties.name) {
                    waitingForNext = true;
                    layer.setStyle(successStyle());
                    examCorrect++;
                    actualizarProgreso();
                    mostrarFeedback("¡Súper bien, Sofía! Es " + feature.properties.name + " 🎒", "success");
                    lanzarConfeti(e.originalEvent.clientX, e.originalEvent.clientY);

                    setTimeout(() => {
                        geojsonLayer.eachLayer(l => geojsonLayer.resetStyle(l));
                        siguientePreguntaProvincia();
                    }, 1500);
                } else {
                    waitingForNext = true;
                    layer.setStyle(errorStyle());

                    // Mostrar la provincia correcta en verde
                    geojsonLayer.eachLayer(l => {
                        if (l.feature === currentTargetFeature) {
                            l.setStyle(successStyle());
                            l.bringToFront();
                        }
                    });

                    mostrarFeedback("¡Uy! Era " + currentTargetFeature.properties.name + ". Mira la verde en el mapa.", "error");

                    setTimeout(() => {
                        geojsonLayer.eachLayer(l => geojsonLayer.resetStyle(l));
                        siguientePreguntaProvincia();
                    }, 2500);
                }

            } else if (currentMode === 'practice') {
                if (!currentTargetFeature || waitingForNext) return;

                if (feature.properties.name === currentTargetFeature.properties.name) {
                    waitingForNext = true;
                    layer.setStyle(successStyle());
                    document.getElementById('exam-correct').innerText = practiceFound;
                    mostrarFeedback("¡Muy bien! " + feature.properties.name + " ✨", "success");
                    lanzarConfeti(e.originalEvent.clientX, e.originalEvent.clientY);

                    setTimeout(() => {
                        // Re-colorear provincias de la comunidad
                        geojsonLayer.eachLayer(l => {
                            const lCom = obtenerComunidad(l.feature.properties.name);
                            if (l.feature === feature) {
                                // Ya encontrada: dejar en verde suave
                                l.setStyle({ fillColor: '#1CC4AB', fillOpacity: 0.5, weight: 2, color: '#065f46' });
                            } else if (lCom === currentCommunityName) {
                                l.setStyle({ fillColor: '#F1DC1B', fillOpacity: 0.35, weight: 2, color: '#c4b5fd' });
                            } else {
                                geojsonLayer.resetStyle(l);
                            }
                        });
                        siguientePreguntaPractica();
                    }, 1500);
                } else {
                    waitingForNext = true;
                    layer.setStyle(errorStyle());

                    // Mostrar la correcta en verde
                    geojsonLayer.eachLayer(l => {
                        if (l.feature === currentTargetFeature) {
                            l.setStyle(successStyle());
                            l.bringToFront();
                        }
                    });

                    // Re-agregar al final de la cola para repetir
                    practiceQueue.unshift(currentTargetFeature);
                    practiceFound--; // No contar este intento

                    mostrarFeedback("¡Casi! Era " + currentTargetFeature.properties.name + ". ¡Volverá a salir!", "error");

                    setTimeout(() => {
                        geojsonLayer.eachLayer(l => {
                            const lCom = obtenerComunidad(l.feature.properties.name);
                            if (lCom === currentCommunityName) {
                                l.setStyle({ fillColor: '#F1DC1B', fillOpacity: 0.35, weight: 2, color: '#c4b5fd' });
                            } else {
                                geojsonLayer.resetStyle(l);
                            }
                        });
                        siguientePreguntaPractica();
                    }, 2500);
                }
            }
        }

        // --- LÓGICA DE MODOS DE JUEGO ---
        function setMode(mode) {
            currentMode = mode;
            currentTargetFeature = null;
            waitingForNext = false;

            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('bdr-turquesa', 'bdr-azul', 'bdr-purpura', 'bdr-amarillo', 'ring-4', 'ring-turquesa', 'ring-azul', 'ring-purpura', 'ring-amarillo');
                btn.classList.add('border-transparent', 'opacity-70');
            });

            const activeBtn = document.getElementById(`btn-${mode}`);
            activeBtn.classList.remove('border-transparent', 'opacity-70');

            document.getElementById('multiple-choice').classList.add('hidden');
            document.getElementById('explore-info').classList.add('hidden');
            document.getElementById('feedback').classList.add('hidden');
            document.getElementById('btn-pista').classList.add('hidden');
            document.getElementById('pista-activa').classList.add('hidden');
            document.getElementById('community-picker').classList.add('hidden');
            document.getElementById('game-content').classList.add('hidden');
            document.getElementById('game-content').classList.remove('flex');

            geojsonLayer.eachLayer(layer => geojsonLayer.resetStyle(layer));

            const title = document.getElementById('game-prompt-title');
            const prompt = document.getElementById('game-prompt');

            if (mode === 'explore') {
                activeBtn.classList.add('bdr-turquesa', 'ring-4', 'ring-turquesa');
                document.getElementById('exam-progress').classList.add('hidden');
                document.getElementById('game-content').classList.remove('hidden');
                document.getElementById('game-content').classList.add('flex');
                title.innerText = "¡Hola exploradora!";
                prompt.innerHTML = "Toca las provincias para <br><span class='text-lg font-normal text-gray-500'>leer los trucos de memoria de tu diario.</span>";
            }
            else if (mode === 'practice') {
                activeBtn.classList.add('bdr-amarillo', 'ring-4', 'ring-amarillo');
                document.getElementById('exam-progress').classList.add('hidden');
                document.getElementById('community-picker').classList.remove('hidden');
                document.getElementById('community-picker').classList.add('flex');
                showCommunityPicker();
            }
            else if (mode === 'guess_prov') {
                activeBtn.classList.add('bdr-azul', 'ring-4', 'ring-azul');
                document.getElementById('game-content').classList.remove('hidden');
                document.getElementById('game-content').classList.add('flex');
                iniciarExamen();
                siguientePreguntaProvincia();
            }
            else if (mode === 'guess_com') {
                activeBtn.classList.add('bdr-purpura', 'ring-4', 'ring-purpura');
                document.getElementById('game-content').classList.remove('hidden');
                document.getElementById('game-content').classList.add('flex');
                iniciarExamen();
                siguientePreguntaComunidad();
            }
        }

        function siguientePreguntaProvincia() {
            document.getElementById('feedback').classList.add('hidden');
            document.getElementById('pista-activa').classList.add('hidden');
            waitingForNext = false;

            if (examQueue.length === 0) {
                mostrarResultadosFinales();
                return;
            }

            currentTargetFeature = examQueue.pop();
            examCurrent++;
            actualizarProgreso();

            document.getElementById('btn-pista').classList.remove('hidden');
            document.getElementById('game-prompt-title').innerText = `Pregunta ${examCurrent} de ${examTotal} — Apunta tu brújula hacia:`;
            document.getElementById('game-prompt').innerText = currentTargetFeature.properties.name;
        }

        // Mostrar pista al usuario
        function mostrarPista() {
            if (!currentTargetFeature) return;
            const provName = currentTargetFeature.properties.name;
            const pista = obtenerPista(provName);

            document.getElementById('btn-pista').classList.add('hidden');
            document.getElementById('pista-texto').innerText = pista;
            document.getElementById('pista-activa').classList.remove('hidden');
        }

        // --- MODO PRÁCTICA POR COMUNIDAD ---
        function buildCommunityMap() {
            const comMap = {};
            provincesFeatures.forEach(f => {
                const com = obtenerComunidad(f.properties.name);
                if (!comMap[com]) comMap[com] = [];
                comMap[com].push(f);
            });
            return comMap;
        }

        function showCommunityPicker() {
            const comMap = buildCommunityMap();
            const container = document.getElementById('community-list');
            container.innerHTML = '';

            // Ordenar comunidades alfabéticamente
            const sorted = Object.keys(comMap).sort();

            sorted.forEach(comName => {
                const count = comMap[comName].length;
                const done = completedCommunities.has(comName);
                const btn = document.createElement('button');
                btn.className = `w-full py-2.5 px-4 rounded-xl font-bold transition-all text-left flex items-center justify-between gap-2 border-2 shadow-sm ${done ? 'bg-turquesa/10 border-turquesa/40 text-turquesa' : 'bg-white border-slate-200 hover:border-amarillo hover:bg-amarillo/5 text-slate-700'}`;
                btn.innerHTML = `<span>${done ? '✅ ' : ''}${comName}</span><span class="text-sm font-normal opacity-60">${count} prov.</span>`;
                if (!done) {
                    btn.onclick = () => startPractice(comName, comMap[comName]);
                }
                container.appendChild(btn);
            });
        }

        function startPractice(comName, features) {
            currentCommunityName = comName;
            practiceQueue = shuffleArray(features);
            practiceTotalInCommunity = features.length;
            practiceFound = 0;
            waitingForNext = false;

            document.getElementById('community-picker').classList.add('hidden');
            document.getElementById('game-content').classList.remove('hidden');
            document.getElementById('game-content').classList.add('flex');

            // Actualizar header
            document.getElementById('progress-label').innerText = 'Provincia';
            document.getElementById('correct-label').innerText = 'Encontradas';
            const prog = document.getElementById('exam-progress');
            prog.classList.remove('hidden');
            document.getElementById('exam-total').innerText = practiceTotalInCommunity;
            document.getElementById('exam-current').innerText = 0;
            document.getElementById('exam-correct').innerText = 0;

            // Colorear todas las provincias de esta comunidad sutilmente
            geojsonLayer.eachLayer(l => {
                const lCom = obtenerComunidad(l.feature.properties.name);
                if (lCom === comName) {
                    l.setStyle({ fillColor: '#F1DC1B', fillOpacity: 0.35, weight: 2, color: '#c4b5fd' });
                } else {
                    geojsonLayer.resetStyle(l);
                }
            });

            siguientePreguntaPractica();
        }

        function siguientePreguntaPractica() {
            document.getElementById('feedback').classList.add('hidden');
            waitingForNext = false;

            if (practiceQueue.length === 0) {
                mostrarResultadosPractica();
                return;
            }

            currentTargetFeature = practiceQueue.pop();
            practiceFound++;

            document.getElementById('exam-current').innerText = practiceFound;
            document.getElementById('exam-correct').innerText = practiceFound - 1;

            // Mostrar pista siempre en modo práctica
            const provName = currentTargetFeature.properties.name;
            const pista = obtenerPista(provName);
            document.getElementById('btn-pista').classList.add('hidden');
            document.getElementById('pista-texto').innerText = pista;
            document.getElementById('pista-activa').classList.remove('hidden');

            document.getElementById('game-prompt-title').innerText = `${currentCommunityName} — Provincia ${practiceFound} de ${practiceTotalInCommunity}`;
            document.getElementById('game-prompt').innerText = provName;
        }

        function mostrarResultadosPractica() {
            currentTargetFeature = null;
            waitingForNext = true;
            completedCommunities.add(currentCommunityName);

            document.getElementById('game-prompt-title').innerText = "¡Comunidad completada!";
            document.getElementById('game-prompt').innerHTML =
                `<div class="text-4xl mb-2">🎉🌟</div>` +
                `<div class="text-2xl font-black text-turquesa">${currentCommunityName}</div>` +
                `<div class="text-lg text-gray-500 mt-1">¡Todas las ${practiceTotalInCommunity} provincias encontradas!</div>` +
                `<button onclick="setMode('practice')" class="mt-4 bg-amarillo/20 hover:bg-amarillo/30 text-amber-800 py-2.5 px-6 rounded-xl font-bold transition-all border border-amarillo/50 shadow-sm">📚 Elegir otra comunidad</button>`;

            document.getElementById('pista-activa').classList.add('hidden');
            document.getElementById('feedback').classList.add('hidden');

            geojsonLayer.eachLayer(layer => {
                const lCom = obtenerComunidad(layer.feature.properties.name);
                if (lCom === currentCommunityName) {
                    layer.setStyle(successStyle());
                } else {
                    geojsonLayer.resetStyle(layer);
                }
            });

            lanzarConfetiCentral();
            setTimeout(lanzarConfetiCentral, 500);
        }

        function siguientePreguntaComunidad() {
            document.getElementById('feedback').classList.add('hidden');
            waitingForNext = false;

            if (examQueue.length === 0) {
                mostrarResultadosFinales();
                return;
            }

            currentTargetFeature = examQueue.pop();
            examCurrent++;
            actualizarProgreso();

            const provName = currentTargetFeature.properties.name;
            const correctComunidad = obtenerComunidad(provName);

            geojsonLayer.eachLayer(layer => {
                if (layer.feature === currentTargetFeature) {
                    layer.setStyle(highlightStyle(true));
                    layer.bringToFront();
                } else {
                    geojsonLayer.resetStyle(layer);
                }
            });

            document.getElementById('game-prompt-title').innerText = `Pregunta ${examCurrent} de ${examTotal} — ¿A qué Comunidad pertenece...`;
            document.getElementById('game-prompt').innerText = provName + "?";

            let opciones = [correctComunidad];
            while (opciones.length < 4) {
                const randomCom = todasLasComunidades[Math.floor(Math.random() * todasLasComunidades.length)];
                if (!opciones.includes(randomCom)) { opciones.push(randomCom); }
            }

            for (let i = opciones.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opciones[i], opciones[j]] = [opciones[j], opciones[i]];
            }

            const btnContainer = document.getElementById('multiple-choice');
            btnContainer.innerHTML = '';
            btnContainer.classList.remove('hidden');

            opciones.forEach(opcion => {
                const btn = document.createElement('button');
                btn.className = "w-full py-3 px-4 bg-white border-2 border-slate-200 hover:border-purpura hover:bg-purpura/5 rounded-xl font-bold text-slate-700 transition-all text-left shadow-sm";
                btn.innerText = opcion;
                btn.onclick = () => verificarComunidad(opcion, correctComunidad, btn);
                btnContainer.appendChild(btn);
            });
        }

        function verificarComunidad(seleccion, correcta, btnElement) {
            if (waitingForNext) return;
            waitingForNext = true;

            const botones = document.querySelectorAll('#multiple-choice button');
            botones.forEach(b => b.disabled = true);

            if (seleccion === correcta) {
                btnElement.classList.replace('border-slate-200', 'border-green-500');
                btnElement.classList.replace('hover:border-purpura', 'bg-green-100');
                btnElement.classList.replace('hover:bg-purpura/5', 'text-green-800');

                examCorrect++;
                actualizarProgreso();
                mostrarFeedback("¡Excelente, Sofía! 🎉", "success");
                lanzarConfetiCentral();
                setTimeout(siguientePreguntaComunidad, 2000);
            } else {
                btnElement.classList.replace('border-slate-200', 'border-coral');
                btnElement.classList.replace('hover:border-purpura', 'bg-coral/10');
                btnElement.classList.replace('hover:bg-purpura/5', 'text-coral');

                botones.forEach(b => {
                    if (b.innerText === correcta) {
                        b.classList.replace('border-slate-200', 'border-green-500');
                        b.classList.add('bg-green-50');
                    }
                });

                mostrarFeedback("Pertenece a " + correcta + ".", "error");
                setTimeout(siguientePreguntaComunidad, 3000);
            }
        }

        // --- RESULTADOS FINALES ---
        function mostrarResultadosFinales() {
            currentTargetFeature = null;
            waitingForNext = true;
            const pct = Math.round((examCorrect / examTotal) * 100);

            let emoji, mensaje;
            if (pct === 100) {
                emoji = "🏆👑";
                mensaje = "¡PERFECTA! Eres la reina de la geografía española.";
            } else if (pct >= 90) {
                emoji = "🌟🎉";
                mensaje = "¡Increíble, Sofía! Eres casi una experta.";
            } else if (pct >= 75) {
                emoji = "🎒✨";
                mensaje = "¡Muy bien! Ya conoces España como una gran viajera.";
            } else if (pct >= 50) {
                emoji = "📚🗺️";
                mensaje = "¡Vas bien! Sigue explorando el mapa para mejorar.";
            } else {
                emoji = "💪🧭";
                mensaje = "¡Ánimo, Sofía! Explora el mapa y vuelve a intentarlo.";
            }

            const colorClass = pct >= 75 ? 'text-turquesa' : pct >= 50 ? 'text-amarillo' : 'text-coral';

            document.getElementById('game-prompt-title').innerText = "Resultado del examen";
            document.getElementById('game-prompt').innerHTML =
                `<div class="text-4xl mb-2">${emoji}</div>` +
                `<div class="text-5xl font-black ${colorClass}">${examCorrect}/${examTotal}</div>` +
                `<div class="text-lg text-gray-500 mt-1">${pct}% de aciertos</div>` +
                `<div class="mt-3 text-base font-bold text-slate-600">${mensaje}</div>`;

            document.getElementById('multiple-choice').classList.add('hidden');
            document.getElementById('btn-pista').classList.add('hidden');
            document.getElementById('pista-activa').classList.add('hidden');
            document.getElementById('feedback').classList.add('hidden');

            geojsonLayer.eachLayer(layer => geojsonLayer.resetStyle(layer));

            if (pct >= 75) {
                lanzarConfetiCentral();
                setTimeout(lanzarConfetiCentral, 500);
                setTimeout(lanzarConfetiCentral, 1000);
            }
        }

        // --- FEEDBACK ---
        function mostrarFeedback(mensaje, tipo) {
            const fb = document.getElementById('feedback');
            fb.innerText = mensaje;
            fb.className = "mt-auto font-bold text-lg p-3 rounded-xl w-full transition-all animate-bounce-short text-center shadow-sm ";

            if (tipo === 'success') {
                fb.classList.add('bg-turquesa/15', 'text-emerald-800', 'border-2', 'border-turquesa/40');
            } else {
                fb.classList.add('bg-coral/10', 'text-red-800', 'border-2', 'border-coral/40');
            }
            fb.classList.remove('hidden');
        }

        // --- EFECTOS DIVERTIDOS (CONFETI) ---
        function lanzarConfeti(x, y, particulas = 50) {
            const xPercent = x / window.innerWidth;
            const yPercent = y / window.innerHeight;
            confetti({ particleCount: particulas, spread: 70, origin: { x: xPercent, y: yPercent }, colors: ['#F8464A', '#7537C8', '#2D40DF', '#1CC4AB', '#F1DC1B'] });
        }

        function lanzarConfetiCentral() {
            confetti({ particleCount: 100, spread: 100, origin: { y: 0.6 }, colors: ['#F8464A', '#7537C8', '#2D40DF', '#1CC4AB', '#F1DC1B'] });
        }

        window.onload = initMap;
    </script>
</body>
</html>
